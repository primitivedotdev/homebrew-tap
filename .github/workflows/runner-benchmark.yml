name: Runner benchmark

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

on:
  push:
    branches:
      - experiment/blacksmith-runner-benchmark

jobs:
  blacksmith-direct-linux-iteration-1:
    name: blacksmith direct linux iter 1 / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x64
            os: blacksmith-32vcpu-ubuntu-2404
          - name: ubuntu-arm64
            os: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: benchmark-blacksmith-direct-${{ matrix.name }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: benchmark-blacksmith-direct-${{ matrix.name }}-rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae primitive

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blacksmith-direct-iter-1-${{ matrix.name }}-bottles
          path: '*.bottle.*'
          if-no-files-found: error

  blacksmith-direct-linux-iteration-2:
    name: blacksmith direct linux iter 2 / ${{ matrix.name }}
    needs: blacksmith-direct-linux-iteration-1
    if: always()
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x64
            os: blacksmith-32vcpu-ubuntu-2404
          - name: ubuntu-arm64
            os: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: benchmark-blacksmith-direct-${{ matrix.name }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: benchmark-blacksmith-direct-${{ matrix.name }}-rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae primitive

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blacksmith-direct-iter-2-${{ matrix.name }}-bottles
          path: '*.bottle.*'
          if-no-files-found: error

  blacksmith-direct-linux-iteration-3:
    name: blacksmith direct linux iter 3 / ${{ matrix.name }}
    needs: blacksmith-direct-linux-iteration-2
    if: always()
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-x64
            os: blacksmith-32vcpu-ubuntu-2404
          - name: ubuntu-arm64
            os: blacksmith-32vcpu-ubuntu-2404-arm
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: benchmark-blacksmith-direct-${{ matrix.name }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: benchmark-blacksmith-direct-${{ matrix.name }}-rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae primitive

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blacksmith-direct-iter-3-${{ matrix.name }}-bottles
          path: '*.bottle.*'
          if-no-files-found: error
