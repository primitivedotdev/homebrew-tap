name: Runner benchmark

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

on:
  push:
    branches:
      - experiment/blacksmith-runner-benchmark

jobs:
  github-iteration-1:
    name: github iter 1 / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-14
            os: macos-14
          - name: macos-15
            os: macos-15
          - name: macos-26
            os: macos-26
          - name: ubuntu-x64
            os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
          - name: ubuntu-arm64
            os: ubuntu-24.04-arm
            container: ghcr.io/homebrew/brew:main
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: benchmark-github-${{ matrix.name }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: benchmark-github-${{ matrix.name }}-rubygems-

      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae primitive

      - name: Upload bottles as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-iter-1-${{ matrix.name }}-bottles
          path: '*.bottle.*'
          if-no-files-found: error

