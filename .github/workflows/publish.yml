name: brew pr-pull

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

on:
  pull_request_target:
    types:
      - labeled
  workflow_run:
    workflows:
      - brew test-bot
    types:
      - completed

concurrency: ${{ github.workflow }}

jobs:
  pr-pull:
    if: >-
      (github.event_name == 'pull_request_target' && contains(github.event.pull_request.labels.*.name, 'pr-pull')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      issues: read
      pull-requests: write
    steps:
      - name: Resolve pull request
        id: pull-request
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          LABELED_PR: ${{ github.event.pull_request.number }}
          WORKFLOW_RUN_PR: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            pr="$LABELED_PR"
          else
            pr="$WORKFLOW_RUN_PR"
          fi

          if [ -z "$pr" ]; then
            echo "::notice::No pull request is associated with this workflow run."
            printf 'number=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_json=$(gh pr view "$pr" --repo "$GITHUB_REPOSITORY" --json baseRefName,headRefName,headRefOid,headRepository,isDraft,state)
          head_repo=$(jq -r '.headRepository.nameWithOwner' <<<"$pr_json")
          head_ref=$(jq -r '.headRefName' <<<"$pr_json")
          head_sha=$(jq -r '.headRefOid' <<<"$pr_json")
          base_ref=$(jq -r '.baseRefName' <<<"$pr_json")
          state=$(jq -r '.state' <<<"$pr_json")
          is_draft=$(jq -r '.isDraft' <<<"$pr_json")

          if [ "$head_repo" != "$GITHUB_REPOSITORY" ] || [[ "$head_ref" != primitive-* ]] || [ "$base_ref" != "main" ] || [ "$state" != "OPEN" ] || [ "$is_draft" != "false" ]; then
            echo "::notice::Skipping pr-pull for ineligible PR $pr: state=$state draft=$is_draft head=$head_repo:$head_ref base=$base_ref."
            printf 'number=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request_target" ]; then
            test_conclusion=$(gh api --method GET "/repos/$GITHUB_REPOSITORY/actions/workflows/tests.yml/runs" \
              -f event=pull_request \
              -f head_sha="$head_sha" \
              -f status=completed \
              -f per_page=1 \
              --jq '.workflow_runs[0].conclusion // ""')

            if [ "$test_conclusion" != "success" ]; then
              echo "::notice::Skipping manual pr-pull for PR $pr until brew test-bot succeeds for $head_sha."
              printf 'number=\n' >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          {
            printf 'number=%s\n' "$pr"
            printf 'head_ref=%s\n' "$head_ref"
            printf 'delete_branch=%s\n' "$([ "$head_repo" = "$GITHUB_REPOSITORY" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        if: steps.pull-request.outputs.number != ''
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        if: steps.pull-request.outputs.number != ''
        uses: Homebrew/actions/git-user-config@main

      - name: Pull bottles
        if: steps.pull-request.outputs.number != ''
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ steps.pull-request.outputs.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        if: steps.pull-request.outputs.number != ''
        uses: Homebrew/actions/git-try-push@main
        with:
          branch: main

      - name: Delete branch
        if: steps.pull-request.outputs.number != '' && steps.pull-request.outputs.delete_branch == 'true'
        env:
          BRANCH: ${{ steps.pull-request.outputs.head_ref }}
        run: git push origin --delete "refs/heads/$BRANCH"
